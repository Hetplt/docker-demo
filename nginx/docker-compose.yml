services:

  frontend:
    image: nginx
    container_name: frontend-nginx

    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - backend

  backend:
    build: ./app
    container_name: flask-backend

  database:
    image: mysql:8
    container_name: mysql-db

    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mydb

    ports:
      - "3306:3306"
